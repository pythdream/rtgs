<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Voting DAO • Arcium RTG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --purple: #c084fc;
      --deep-purple: #7e22ce;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      background: #0a0a1f;
    }

    /* Bird Video Background */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.78) contrast(1.15) saturate(1.1);
    }

    #bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(20, 10, 45, 0.82);
      z-index: -1;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 10, 40, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.2);
      z-index: 1000;
      padding: 18px 5%;
    }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.65rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c084fc, #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links a, .nav-links button {
      color: #e0d4ff;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.3s;
    }

    .nav-links a:hover, .nav-links button:hover {
      color: var(--purple);
    }

    .faucet {
      background: var(--purple);
      color: #1a0033;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
    }

    .main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 100px;
    }

    .content {
      max-width: 720px;
      padding: 0 20px;
    }

    h1 {
      font-size: 3.8rem;
      line-height: 1.1;
      font-weight: 700;
      background: linear-gradient(90deg, #e0bbff, #c084fc, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1.35rem;
      color: #d1c4ff;
      margin-bottom: 50px;
      opacity: 0.95;
    }

    .btn-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 18px 42px;
      font-size: 1.25rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s ease;
      border: none;
    }

    .btn-primary {
      background: var(--purple);
      color: #1a0033;
      box-shadow: 0 10px 30px rgba(192, 132, 252, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(192, 132, 252, 0.5);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--purple);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(192, 132, 252, 0.1);
    }

    .proposals-section {
      padding: 100px 5% 120px;
      background: rgba(10, 10, 31, 0.6);
    }

    .section-title {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 50px;
      color: #e0bbff;
    }

    /* Keep your existing proposal cards but cleaner */
    .proposal-card {
      background: rgba(26, 26, 46, 0.85);
      border: 1px solid rgba(192, 132, 252, 0.25);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 25px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      transition: all 0.4s;
    }

    .proposal-card:hover {
      transform: translateY(-10px);
      border-color: var(--purple);
      box-shadow: 0 20px 40px rgba(192, 132, 252, 0.2);
    }
  </style>
</head>

    <source src="https://video.twimg.com/amplify_video/2037418193816576000/vid/avc1/416x752/uLopM8-wWo-6BCzY.mp4?tag=24" type="video/mp4">
  </video>
  <div id="bg-overlay"></div>

  <header>
    <div class="nav">
      <div class="logo">Private Voting DAO</div>
      <div class="nav-links">
        <a href="https://faucet.solana.com/" target="_blank" class="faucet">🚰 Faucet</a>
        <button onclick="showAboutModal()">About</button>
        <a href="https://x.com/FaithDpy" target="_blank">𝕏 FaithDpy</a>
      </div>
    </div>
  </header>

  <section class="main">
    <div class="content">
      <h1>Private Voting<br>on Solana</h1>
      <p class="subtitle">Encrypted votes. Zero knowledge. Powered by Arcium MPC.</p>
      
      <div class="btn-group">
        <button class="btn-primary" onclick="connectPhantom()">Connect Wallet</button>
        <button class="btn-secondary" onclick="showCreateProposal()">Create Proposal</button>
      </div>
    </div>
  </section>

  <!-- Proposals Section -->
  <section class="proposals-section">
    <h2 class="section-title">Active Proposals</h2>
    <div id="proposalList"></div>
  </section>

  </script>
</body>
</html>
