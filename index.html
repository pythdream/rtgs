<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Voting DAO • Arcium</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a1f;
      color: #e0e0ff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    header {
      background: rgba(10,10,31,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #00ff9d, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .container {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h1 {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .subtitle {
      text-align: center;
      color: #a0a0ff;
      font-size: 1.35rem;
      max-width: 600px;
      margin: 0 auto 50px;
    }
    .wallet {
      background: rgba(0,255,157,0.08);
      border: 1px solid rgba(0,255,157,0.3);
      padding: 14px 28px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
      font-family: monospace;
    }
    button {
      padding: 16px 40px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 10px;
    }
    .btn-primary {
      background: #00ff9d;
      color: #000;
    }
    .btn-primary:hover {
      background: #00e68a;
      transform: translateY(-3px);
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid #00ff9d;
      color: #fff;
    }
    .btn-secondary:hover {
      background: rgba(0,255,157,0.1);
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,31,0.9);
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: #16162b;
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    input, textarea, select {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
    }
    .proposal-card {
      background: #16162b;
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .status {
      margin: 30px 0;
      text-align: center;
      min-height: 80px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="logo">Privo DAO</div>
      <div style="color:#00ff9d; font-weight:500;">Secured by Arcium MPC • Devnet</div>
    </div>
  </header>

  <div class="container">
    <h1>Private Voting DAO</h1>
    <p class="subtitle">Fully encrypted on-chain governance. Your vote stays private.</p>

    <div id="walletSection" class="wallet" style="display:none;">
      <span>👛 Connected</span>
      <span id="walletAddress" style="font-family:monospace;"></span>
    </div>

    <button id="connectBtn" class="btn-primary" onclick="connectPhantom()">
      Connect Phantom Wallet
    </button>

    <button id="voteBtn" class="btn-primary" onclick="castVote()" style="display:none;">
      Cast Private Vote
    </button>

    <button id="proposalBtn" class="btn-secondary" onclick="showCreateProposal()" style="display:none;">
      Create New Proposal
    </button>

    <div id="status" class="status"></div>

    <div class="proposals">
      <h2 style="margin-bottom:20px;">Active Proposals</h2>
      <div id="proposalList"></div>
    </div>
  </div>

  <!-- Create Proposal Modal -->
  <div id="proposalModal" class="modal">
    <div class="modal-content">
      <h2>Create New Proposal</h2>
      <input id="propTitle" type="text" placeholder="Proposal Title">
      <textarea id="propDesc" rows="5" placeholder="Purpose and detailed explanation..."></textarea>
      
      <label style="display:block; margin:15px 0 8px; color:#ccc;">Voting Duration</label>
      <select id="propDuration">
        <option value="3600">1 hour</option>
        <option value="21600">6 hours</option>
        <option value="86400" selected>24 hours</option>
        <option value="259200">3 days</option>
        <option value="604800">7 days</option>
      </select>

      <button onclick="submitProposal()" class="btn-primary" style="width:100%; margin-top:20px;">Submit Proposal to DAO</button>
      <button onclick="hideCreateProposal()" style="width:100%; margin-top:12px; background:none; border:1px solid #555; color:#aaa;">Cancel</button>
    </div>
  </div>

  <script>
    let walletAddress = null;
    let proposals = [];

    async function connectPhantom() {
      if (!window.solana || !window.solana.isPhantom) {
        alert("Please install Phantom wallet → phantom.app");
        return;
      }
      try {
        const resp = await window.solana.connect();
        walletAddress = resp.publicKey.toString();
        document.getElementById('walletAddress').textContent = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
        document.getElementById('walletSection').style.display = 'inline-flex';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('voteBtn').style.display = 'inline-block';
        document.getElementById('proposalBtn').style.display = 'inline-block';
      } catch (err) {
        alert("Connection failed");
      }
    }

    async function castVote() {
      if (!walletAddress) return;
      const status = document.getElementById('status');
      status.innerHTML = '🔒 Preparing private transaction on devnet...';
      setTimeout(async () => {
        status.innerHTML = '📡 Asking Phantom to approve transaction...';
        try {
          const message = new TextEncoder().encode("Cast encrypted vote using Arcium MPC - Devnet");
          await window.solana.signMessage(message, "utf8");
          status.innerHTML = `✅ Vote successfully cast and encrypted!<br>Signed by ${walletAddress.slice(0,6)}...`;
        } catch (err) {
          status.innerHTML = '❌ Transaction rejected';
        }
      }, 900);
    }

    function showCreateProposal() {
      document.getElementById('proposalModal').style.display = 'flex';
    }

    function hideCreateProposal() {
      document.getElementById('proposalModal').style.display = 'none';
    }

    function submitProposal() {
      const title = document.getElementById('propTitle').value || "Untitled Proposal";
      const desc = document.getElementById('propDesc').value || "No description provided";
      const duration = parseInt(document.getElementById('propDuration').value);

      proposals.unshift({
        title: title,
        desc: desc,
        endTime: Date.now() + duration * 1000,
        yes: Math.floor(Math.random()*30) + 65,
        no: Math.floor(Math.random()*20) + 10
      });

      hideCreateProposal();
      renderProposals();

      const status = document.getElementById('status');
      status.innerHTML = `✅ Proposal "${title}" created and published on-chain!`;
      setTimeout(() => status.innerHTML = '', 4000);
    }

    function renderProposals() {
      const container = document.getElementById('proposalList');
      container.innerHTML = proposals.map(p => {
        const timeLeft = Math.max(0, Math.floor((p.endTime - Date.now()) / 1000));
        const timer = timeLeft > 0 
          ? `${Math.floor(timeLeft/3600)}h ${Math.floor((timeLeft%3600)/60)}m remaining` 
          : `<span style="color:#00ff9d;">Voting ended • Results ready</span>`;
        return `
          <div class="proposal-card">
            <strong>${p.title}</strong>
            <p style="margin:12px 0 8px; color:#ccc;">${p.desc}</p>
            <div style="color:#00ff9d; font-size:0.95rem;">${timer}</div>
          </div>
        `;
      }).join('');
    }

    // Initial demo proposals
    proposals = [
      { title: "Increase marketing budget by 20%", desc: "Allocate additional SOL to community growth and partnerships", endTime: Date.now() + 86400000, yes: 78, no: 22 }
    ];
    renderProposals();
  </script>
</body>
</html>
