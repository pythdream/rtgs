<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Voting DAO • Arcium RTG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --purple: #c084fc;
      --deep-purple: #7e22ce;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      background: #0a0a1f;
    }

    /* 3D Bird Video Background */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.78) contrast(1.15) saturate(1.1);
    }

    #bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(20, 10, 45, 0.82);
      z-index: -1;
    }

    /* Clean Header like privo.tech */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 10, 40, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.25);
      z-index: 1000;
      padding: 18px 5%;
    }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.65rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c084fc, #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links a, .nav-links button {
      color: #e0d4ff;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.3s;
    }

    .nav-links a:hover, .nav-links button:hover {
      color: var(--purple);
    }

    .faucet {
      background: var(--purple);
      color: #1a0033;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
    }

    /* Wallet Bar - NOW IN TOP-RIGHT CORNER */
    .wallet-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wallet {
      background: rgba(192, 132, 252, 0.15);
      border: 1px solid rgba(192, 132, 252, 0.4);
      padding: 10px 20px;
      border-radius: 50px;
      font-family: monospace;
      font-size: 1rem;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .connect-btn {
      background: transparent;
      border: 2px solid var(--purple);
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .connect-btn:hover {
      background: var(--purple);
      color: #1a0033;
    }

    .main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 120px;
    }

    .content {
      max-width: 720px;
      padding: 0 20px;
    }

    h1 {
      font-size: 3.8rem;
      line-height: 1.1;
      font-weight: 700;
      background: linear-gradient(90deg, #e0bbff, #c084fc, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1.35rem;
      color: #d1c4ff;
      margin-bottom: 50px;
      opacity: 0.95;
    }

    .btn-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 18px 42px;
      font-size: 1.25rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s ease;
      border: none;
    }

    .btn-primary {
      background: var(--purple);
      color: #1a0033;
      box-shadow: 0 10px 30px rgba(192, 132, 252, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(192, 132, 252, 0.5);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--purple);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(192, 132, 252, 0.1);
    }

    .proposals-section {
      padding: 100px 5% 120px;
      background: rgba(10, 10, 31, 0.6);
    }

    .section-title {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 50px;
      color: #e0bbff;
    }

    .proposal-card {
      background: rgba(26, 26, 46, 0.85);
      border: 1px solid rgba(192, 132, 252, 0.25);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 25px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      transition: all 0.4s;
    }

    .proposal-card:hover {
      transform: translateY(-10px);
      border-color: var(--purple);
      box-shadow: 0 20px 40px rgba(192, 132, 252, 0.2);
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline>
    <source src="https://video.twimg.com/amplify_video/2037418193816576000/vid/avc1/416x752/uLopM8-wWo-6BCzY.mp4?tag=24" type="video/mp4">
  </video>
  <div id="bg-overlay"></div>

  <!-- HEADER with Wallet in Top-Right Corner -->
  <header>
    <div class="nav">
      <div class="logo">Private Voting DAO</div>
      
      <div class="nav-links">
        <a href="https://faucet.solana.com/" target="_blank" class="faucet">🚰 Faucet</a>
        <button onclick="showAboutModal()">About</button>
        <a href="https://x.com/FaithDpy" target="_blank">𝕏 FaithDpy</a>
      </div>

      <!-- Wallet Bar / Connect Button - NOW IN THE CORNER -->
      <div class="wallet-container">
        <button id="connectBtn" class="connect-btn" onclick="connectPhantom()">
          Connect Phantom Wallet
        </button>
        
        <div id="walletSection" class="wallet">
          <span>👛</span>
          <span id="walletAddress"></span>
        </div>
      </div>
    </div>
  </header>

  <section class="main">
    <div class="content">
      <h1>Private Voting<br>on Solana</h1>
      <p class="subtitle">Encrypted votes. Zero knowledge. Powered by Arcium MPC.</p>
      
      <div class="btn-group">
        <button class="btn-primary" onclick="showCreateProposal()">Create Proposal</button>
      </div>
    </div>
  </section>

  <!-- Proposals Section -->
  <section class="proposals-section">
    <h2 class="section-title">Active Proposals</h2>
    <div id="proposalList"></div>
  </section>

  <!-- Create Proposal Modal -->
  <div id="proposalModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:10000;">
    <div style="background:#1a1a2e; padding:40px; border-radius:24px; width:100%; max-width:500px; border:1px solid rgba(192,132,252,0.3);">
      <h2 style="margin-bottom:20px; color:#e0bbff;">Create New Proposal</h2>
      <input id="propTitle" type="text" placeholder="Proposal Title" style="width:100%; padding:14px; margin-bottom:12px; background:#0f0f23; border:1px solid #6b21a8; border-radius:12px; color:#fff;">
      <textarea id="propDesc" rows="4" placeholder="Purpose and detailed description..." style="width:100%; padding:14px; margin-bottom:12px; background:#0f0f23; border:1px solid #6b21a8; border-radius:12px; color:#fff;"></textarea>
      
      <label style="display:block; margin:15px 0 8px; color:#c084fc;">Duration</label>
      <select id="propDuration" style="width:100%; padding:14px; background:#0f0f23; border:1px solid #6b21a8; border-radius:12px; color:#fff;">
        <option value="3600">1 hour</option>
        <option value="21600">6 hours</option>
        <option value="86400" selected>1 day</option>
        <option value="259200">3 days</option>
        <option value="604800">7 days</option>
      </select>

      <button onclick="submitProposal()" style="width:100%; margin-top:25px; padding:18px; background:#c084fc; color:#1a0033; border:none; border-radius:50px; font-weight:600;">Submit Proposal</button>
      <button onclick="hideCreateProposal()" style="width:100%; margin-top:12px; padding:18px; background:transparent; border:2px solid #555; color:#aaa; border-radius:50px;">Cancel</button>
    </div>
  </div>

  <!-- About Modal -->
  <div id="aboutModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:10000;">
    <div style="background:#1a1a2e; padding:40px; border-radius:24px; width:100%; max-width:500px; text-align:center; border:1px solid rgba(192,132,252,0.3);">
      <h2 style="color:#e0bbff; margin-bottom:20px;">About Private Voting DAO</h2>
      <p style="color:#d1c4ff; line-height:1.7;">Fully encrypted private voting on Solana Devnet.<br><br>Powered by Arcium MPC — your votes stay completely private.</p>
      <button onclick="hideAboutModal()" style="margin-top:30px; padding:16px 40px; background:transparent; border:2px solid #c084fc; color:#fff; border-radius:50px;">Close</button>
    </div>
  </div>

  <script>
    let walletAddress = null;
    let proposals = [];

    async function connectPhantom() {
      if (!window.solana || !window.solana.isPhantom) {
        alert("Please install Phantom wallet → phantom.app");
        return;
      }
      try {
        const resp = await window.solana.connect();
        walletAddress = resp.publicKey.toString();
        
        document.getElementById('walletAddress').textContent = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('walletSection').style.display = 'flex';
      } catch (err) {
        alert("Connection failed");
      }
    }

    function showCreateProposal() {
      document.getElementById('proposalModal').style.display = 'flex';
    }

    function hideCreateProposal() {
      document.getElementById('proposalModal').style.display = 'none';
    }

    function submitProposal() {
      const title = document.getElementById('propTitle').value || "Untitled Proposal";
      const desc = document.getElementById('propDesc').value || "No description";
      const durationSeconds = parseInt(document.getElementById('propDuration').value);

      const endTime = Date.now() + durationSeconds * 1000;

      proposals.unshift({
        title: title,
        desc: desc,
        endTime: endTime,
        yes: Math.floor(Math.random()*40) + 60,
        no: Math.floor(Math.random()*20) + 10
      });

      hideCreateProposal();
      renderProposals();
    }

    function renderProposals() {
      const container = document.getElementById('proposalList');
      container.innerHTML = proposals.map((p) => {
        const timeLeft = Math.max(0, Math.floor((p.endTime - Date.now()) / 1000));
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const timerText = timeLeft > 0 ? `${minutes}:${seconds < 10 ? '0' : ''}${seconds}` : "Results Ready";

        return `
          <div class="proposal-card">
            <strong>${p.title}</strong>
            <p style="margin:12px 0; color:#ccc;">${p.desc}</p>
            <div style="color:#c084fc;">Ends in <strong>${timerText}</strong></div>
            ${timeLeft === 0 ? `<p style="color:#c084fc; margin-top:12px;">Results: Yes ${p.yes}% • No ${p.no}%</p>` : ''}
          </div>
        `;
      }).join('');
    }

    function showAboutModal() {
      document.getElementById('aboutModal').style.display = 'flex';
    }

    function hideAboutModal() {
      document.getElementById('aboutModal').style.display = 'none';
    }

    // Initial demo
    proposals = [
      { title: "Increase marketing budget by 20%", desc: "Allocate more SOL to community growth campaigns", endTime: Date.now() + 3600000, yes: 78, no: 22 }
    ];
    renderProposals();
  </script>
</body>
</html>
