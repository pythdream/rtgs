<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Voting DAO • Arcium RTG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root { --purple: #c084fc; }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: #fff;
      min-height: 100vh;
      background: #0a0a1f;
    }

    #bg-video {
      position: fixed; top:0; left:0; width:100%; height:100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.78) contrast(1.15);
    }

    #bg-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(20,10,45,0.82); z-index: -1;
    }

    header {
      position: fixed; top:0; width:100%;
      background: rgba(15,10,40,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(192,132,252,0.25);
      z-index: 1000; padding: 18px 5%;
    }

    .nav {
      max-width: 1100px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
    }

    .logo {
      font-size: 1.65rem; font-weight:700;
      background: linear-gradient(90deg, #c084fc, #d8b4fe);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .nav-links { display:flex; gap:28px; align-items:center; }

    .nav-links a, .nav-links button {
      color:#e0d4ff; text-decoration:none; font-weight:500; font-size:1.05rem;
    }
    .nav-links a:hover, .nav-links button:hover { color:var(--purple); }

    .faucet {
      background:var(--purple); color:#1a0033; padding:10px 26px;
      border-radius:50px; font-weight:600;
    }

    .wallet { display:none; background:rgba(192,132,252,0.15); border:1px solid rgba(192,132,252,0.4);
      padding:10px 20px; border-radius:50px; font-family:monospace; align-items:center; gap:8px; }

    .connect-btn {
      background:transparent; border:2px solid var(--purple); color:#fff;
      padding:12px 28px; border-radius:50px; font-weight:600; cursor:pointer;
    }

    .main {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      text-align:center; padding-top:120px;
    }

    h1 { font-size:3.8rem; font-weight:700;
      background:linear-gradient(90deg,#e0bbff,#c084fc,#a855f7);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    .subtitle { font-size:1.35rem; color:#d1c4ff; margin:20px 0 50px; }

    .btn-group { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }

    button {
      padding:18px 42px; font-size:1.25rem; font-weight:600;
      border-radius:50px; cursor:pointer; transition:all 0.4s;
    }

    .btn-primary { background:var(--purple); color:#1a0033; }
    .btn-primary:hover { transform:translateY(-6px); }

    .proposals-section { padding:100px 5% 120px; background:rgba(10,10,31,0.6); }

    .section-title { text-align:center; font-size:2rem; margin-bottom:50px; color:#e0bbff; }

    .proposal-card {
      background:rgba(26,26,46,0.9); border:1px solid rgba(192,132,252,0.3);
      border-radius:20px; padding:28px; margin-bottom:25px;
      max-width:800px; margin-left:auto; margin-right:auto;
    }

    .vote-bar { height:12px; background:#2a2a4a; border-radius:999px; overflow:hidden; margin:20px 0; }
    .yes-bar { height:100%; background:linear-gradient(90deg,#c084fc,#a855f7); transition:width 0.8s; }
    .no-bar { height:100%; background:linear-gradient(90deg,#f472b6,#db2777); transition:width 0.8s; }

    .vote-results { display:flex; justify-content:space-between; font-size:1.1rem; margin-top:8px; }

    .modal {
      display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.92); align-items:center; justify-content:center; z-index:10000;
    }

    .modal-content {
      background:#1a1a2e; padding:40px; border-radius:24px; width:100%; max-width:480px;
      border:1px solid rgba(192,132,252,0.4);
    }

    .yes-btn { background:#c084fc; color:#1a0033; width:100%; padding:20px; font-size:1.4rem; border-radius:16px; margin:12px 0; }
    .no-btn { background:#f472b6; color:#1a0033; width:100%; padding:20px; font-size:1.4rem; border-radius:16px; margin:12px 0; }
  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline>
    <source src="https://video.twimg.com/amplify_video/2037418193816576000/vid/avc1/416x752/uLopM8-wWo-6BCzY.mp4?tag=24" type="video/mp4">
  </video>
  <div id="bg-overlay"></div>

  <header>
    <div class="nav">
      <div class="logo">Private Voting DAO</div>
      <div class="nav-links">
        <a href="https://faucet.solana.com/" target="_blank" class="faucet">🚰 Faucet</a>
        <button onclick="showAboutModal()">About</button>
        <a href="https://x.com/FaithDpy" target="_blank">𝕏 FaithDpy</a>
      </div>

      <div>
        <button id="connectBtn" class="connect-btn" onclick="connectPhantom()">Connect Phantom Wallet</button>
        <div id="walletSection" class="wallet">
          <span>👛</span>
          <span id="walletAddress"></span>
        </div>
      </div>
    </div>
  </header>

  <section class="main">
    <div>
      <h1>Private Voting<br>on Solana</h1>
      <p class="subtitle">Encrypted votes. Zero knowledge. Powered by Arcium MPC.</p>
      <div class="btn-group">
        <button class="btn-primary" onclick="showCreateProposal()">Create New Proposal</button>
      </div>
    </div>
  </section>

  <section class="proposals-section">
    <h2 class="section-title">Active Proposals</h2>
    <div id="proposalList"></div>
  </section>

  <!-- Create Proposal Modal -->
  <div id="proposalModal" class="modal">
    <div class="modal-content">
      <h2 style="color:#e0bbff; margin-bottom:20px;">Create New Proposal</h2>
      <input id="propTitle" type="text" placeholder="Proposal Title" style="width:100%; padding:14px; margin:10px 0; background:#0f0f23; border:1px solid #6b21a8; border-radius:12px; color:#fff;">
      <textarea id="propDesc" rows="4" placeholder="Purpose and detailed description..." style="width:100%; padding:14px; margin:10px 0; background:#0f0f23; border:1px solid #6b21a8; border-radius:12px; color:#fff;"></textarea>
      
      <label style="display:block; margin:15px 0 8px; color:#c084fc;">Duration</label>
      <select id="propDuration" style="width:100%; padding:14px; background:#0f0f23; border:1px solid #6b21a8; border-radius:12px; color:#fff;">
        <option value="3600">1 hour</option>
        <option value="21600">6 hours</option>
        <option value="86400" selected>1 day</option>
        <option value="259200">3 days</option>
        <option value="604800">7 days</option>
      </select>

      <button onclick="submitProposal()" style="width:100%; margin-top:25px; padding:18px; background:#c084fc; color:#1a0033; border:none; border-radius:50px; font-weight:600;">Submit Proposal to DAO</button>
      <button onclick="hideCreateProposal()" style="width:100%; margin-top:12px; padding:18px; background:transparent; border:2px solid #555; color:#aaa; border-radius:50px;">Cancel</button>
    </div>
  </div>

  <!-- Vote Modal -->
  <div id="voteModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-bottom:15px; color:#e0bbff;"></h2>
      <p id="modalDesc" style="color:#d1c4ff; margin-bottom:30px;"></p>

      <button onclick="castVote(true)" class="yes-btn">✅ YES</button>
      <button onclick="castVote(false)" class="no-btn">❌ NO</button>

      <button onclick="hideVoteModal()" style="margin-top:25px; background:transparent; border:2px solid #555; color:#aaa; padding:14px 40px; border-radius:50px;">Cancel</button>
    </div>
  </div>

  <!-- About Modal -->
  <div id="aboutModal" class="modal">
    <div class="modal-content">
      <h2 style="color:#e0bbff;">About</h2>
      <p style="color:#d1c4ff; line-height:1.7; margin:25px 0;">Fully encrypted private voting on Solana Devnet.<br><br>Powered by Arcium MPC.</p>
      <button onclick="hideAboutModal()" style="padding:16px 40px; background:transparent; border:2px solid #c084fc; color:#fff; border-radius:50px;">Close</button>
    </div>
  </div>

  <script>
    let walletAddress = null;
    let proposals = [];
    let currentVoteIndex = null;

    async function connectPhantom() {
      if (!window.solana || !window.solana.isPhantom) {
        alert("Please install Phantom wallet → phantom.app");
        return;
      }
      try {
        const resp = await window.solana.connect();
        walletAddress = resp.publicKey.toString();
        document.getElementById('walletAddress').textContent = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('walletSection').style.display = 'flex';
      } catch (err) { alert("Connection failed"); }
    }

    function showCreateProposal() {
      document.getElementById('proposalModal').style.display = 'flex';
    }

    function hideCreateProposal() {
      document.getElementById('proposalModal').style.display = 'none';
    }

    function submitProposal() {
      const title = document.getElementById('propTitle').value || "Untitled Proposal";
      const desc = document.getElementById('propDesc').value || "No description";
      const duration = parseInt(document.getElementById('propDuration').value);

      proposals.unshift({
        title: title,
        desc: desc,
        endTime: Date.now() + duration * 1000,
        yes: Math.floor(Math.random()*40) + 55,
        no: Math.floor(Math.random()*30) + 20
      });

      hideCreateProposal();
      renderProposals();
    }

    function showVoteModal(i) {
      if (!walletAddress) { alert("Please connect wallet first"); return; }
      currentVoteIndex = i;
      const p = proposals[i];
      document.getElementById('modalTitle').textContent = p.title;
      document.getElementById('modalDesc').textContent = p.desc;
      document.getElementById('voteModal').style.display = 'flex';
    }

    function hideVoteModal() {
      document.getElementById('voteModal').style.display = 'none';
    }

    async function castVote(isYes) {
      hideVoteModal();
      const p = proposals[currentVoteIndex];

      if (isYes) p.yes += Math.floor(Math.random()*15) + 8;
      else p.no += Math.floor(Math.random()*12) + 6;

      renderProposals();

      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1a1a2e; padding:16px 30px; border-radius:50px; box-shadow:0 10px 30px rgba(192,132,252,0.5); z-index:9999;';
      msg.textContent = `✅ ${isYes ? 'YES' : 'NO'} vote encrypted on-chain!`;
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 3000);
    }

    function renderProposals() {
      const container = document.getElementById('proposalList');
      container.innerHTML = proposals.map((p, i) => {
        const total = p.yes + p.no;
        const yesP = total ? Math.round((p.yes / total) * 100) : 50;
        const noP = 100 - yesP;

        const timeLeft = Math.max(0, Math.floor((p.endTime - Date.now()) / 1000));
        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;
        const timer = timeLeft > 0 ? `${min}:${sec < 10 ? '0' : ''}${sec}` : "Closed";

        return `
          <div class="proposal-card">
            <strong style="font-size:1.35rem;">${p.title}</strong>
            <p style="margin:14px 0; color:#ccc;">${p.desc}</p>
            <div style="color:#c084fc; margin-bottom:15px;">⏳ Ends in <strong>${timer}</strong></div>

            <div class="vote-bar"><div class="yes-bar" style="width:${yesP}%"></div></div>
            <div class="vote-results">
              <span>✅ Yes <strong>${yesP}%</strong></span>
              <span>❌ No <strong>${noP}%</strong></span>
            </div>

            ${timeLeft > 0 ? `<button onclick="showVoteModal(${i})" style="margin-top:25px; width:100%; padding:16px; background:#c084fc; color:#1a0033; border:none; border-radius:50px; font-weight:600;">Cast Private Vote</button>` : ''}
          </div>
        `;
      }).join('');
    }

    function showAboutModal() { document.getElementById('aboutModal').style.display = 'flex'; }
    function hideAboutModal() { document.getElementById('aboutModal').style.display = 'none'; }

    // Initial data
    proposals = [{
      title: "Increase marketing budget by 20%",
      desc: "Allocate more SOL to community growth campaigns",
      endTime: Date.now() + 7200000,
      yes: 68,
      no: 32
    }];

    renderProposals();
    setInterval(renderProposals, 1000);
  </script>
</body>
</html>
