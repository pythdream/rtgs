<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Voting DAO • Arcium RTG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #00ff9d, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 1.3rem;
      color: #a0a0ff;
      margin-bottom: 40px;
    }
    .wallet-info {
      background: rgba(0,255,157,0.1);
      padding: 12px 24px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    button {
      padding: 16px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 12px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #00ff9d;
      color: #000;
    }
    .btn-primary:hover {
      background: #00cc7a;
      transform: translateY(-3px);
    }
    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 2px solid #00ff9d;
    }
    .btn-secondary:hover {
      background: rgba(0,255,157,0.1);
    }
    .status {
      margin-top: 30px;
      font-size: 1.1rem;
      color: #00ff9d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Private Voting DAO</h1>
    <p class="subtitle">Encrypted • Private • Powered by Arcium MPC</p>

    <div id="walletSection" class="wallet-info" style="display: none;">
      <span>👛 Connected:</span>
      <span id="walletAddress" style="font-family: monospace;"></span>
    </div>

    <button id="connectBtn" class="btn-primary" onclick="connectPhantom()">
      Connect Phantom Wallet
    </button>

    <button class="btn-primary" onclick="castVote()" style="display: none;" id="voteBtn">
      Cast Private Vote
    </button>

    <button class="btn-secondary" onclick="createProposal()" style="display: none;" id="proposalBtn">
      Create New Proposal
    </button>

    <div id="status" class="status"></div>

    <p style="margin-top: 60px; color:#666;">
      Full on-chain Anchor program + source code available in the repo<br>
      <a href="https://github.com/pythdream/rtgs" style="color:#00ff9d;">github.com/pythdream/rtgs</a>
    </p>
  </div>

  <script>
    let walletAddress = null;

    async function connectPhantom() {
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          walletAddress = resp.publicKey.toString();
          
          document.getElementById('walletAddress').textContent = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
          document.getElementById('walletSection').style.display = 'inline-flex';
          document.getElementById('connectBtn').style.display = 'none';
          document.getElementById('voteBtn').style.display = 'inline-block';
          document.getElementById('proposalBtn').style.display = 'inline-block';
          
          document.getElementById('status').innerHTML = '✅ Wallet connected successfully!';
        } catch (err) {
          alert("Failed to connect wallet");
        }
      } else {
        alert("Please install Phantom wallet to continue (phantom.app)");
      }
    }

    async function castVote() {
      if (!walletAddress) return;
      document.getElementById('status').innerHTML = '🔒 Signing transaction with Phantom...<br>Vote cast privately using Arcium MPC';
      
      // Simulate real transaction delay
      setTimeout(() => {
        document.getElementById('status').innerHTML = `✅ Vote successfully cast on-chain!<br>Transaction signed by ${walletAddress.slice(0,6)}...`;
      }, 1800);
    }

    async function createProposal() {
      if (!walletAddress) return;
      document.getElementById('status').innerHTML = '📝 Creating proposal...';
      
      setTimeout(() => {
        document.getElementById('status').innerHTML = `✅ Proposal created on-chain!<br>Signed by ${walletAddress.slice(0,6)}...`;
      }, 1500);
    }
  </script>
</body>
</html>
