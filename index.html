<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privo DAO • Private Voting on Arcium</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #00ff9d;
      --primary-dark: #00e68a;
      --bg: #0a0a1f;
      --card: #16162b;
      --text: #e0e0ff;
      --text-light: #a0a0ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      background: rgba(10, 10, 31, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -1.2px;
      background: linear-gradient(90deg, #00ff9d, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: var(--text-light);
      font-size: 1.4rem;
      max-width: 620px;
      margin: 0 auto 50px;
    }

    .wallet {
      background: rgba(0, 255, 157, 0.08);
      border: 1px solid rgba(0, 255, 157, 0.35);
      padding: 16px 32px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
      font-family: monospace;
      font-size: 1.05rem;
    }

    button {
      padding: 16px 40px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 8px;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 255, 157, 0.3);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--primary);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(0, 255, 157, 0.1);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,31,0.92);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(8px);
    }

    .modal-content {
      background: #16162b;
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.6);
    }

    input, textarea, select {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      background: #0f0f23;
      border: 1px solid #444;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: border 0.3s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      outline: none;
    }

    .proposal-card {
      background: var(--card);
      padding: 28px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      transition: transform 0.3s ease;
    }

    .proposal-card:hover {
      transform: translateY(-4px);
    }

    .status {
      margin: 30px 0;
      text-align: center;
      min-height: 80px;
      font-size: 1.15rem;
      font-weight: 500;
    }

    .timer {
      color: #00ff9d;
      font-weight: 500;
    }

    .ended {
      color: #00ff9d;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="logo">Privo DAO</div>
      <div style="color:#00ff9d; font-weight:500;">Secured by Arcium MPC • Devnet</div>
    </div>
  </header>

  <div class="container">
    <h1>Private Voting DAO</h1>
    <p class="subtitle">Fully encrypted on-chain governance.<br>Your vote stays completely private.</p>

    <div id="walletSection" class="wallet" style="display:none;">
      <span>👛 Connected</span>
      <span id="walletAddress"></span>
    </div>

    <div style="text-align: center; margin-bottom: 40px;">
      <button id="connectBtn" class="btn-primary" onclick="connectPhantom()">
        Connect Phantom Wallet
      </button>

      <button id="voteBtn" class="btn-primary" onclick="castVote()" style="display:none;">
        Cast Private Vote
      </button>

      <button id="proposalBtn" class="btn-secondary" onclick="showCreateProposal()" style="display:none;">
        Create New Proposal
      </button>
    </div>

    <div id="status" class="status"></div>

    <div class="proposals">
      <h2 style="margin-bottom: 24px; text-align: center;">Active Proposals</h2>
      <div id="proposalList"></div>
    </div>
  </div>

  <!-- Create Proposal Modal -->
  <div id="proposalModal" class="modal">
    <div class="modal-content">
      <h2 style="margin-bottom: 24px;">Create New Proposal</h2>
      <input id="propTitle" type="text" placeholder="Proposal Title">
      <textarea id="propDesc" rows="5" placeholder="Purpose and detailed explanation..."></textarea>
      
      <label style="display:block; margin:18px 0 8px; color:#ccc; font-weight:500;">Voting Duration</label>
      <select id="propDuration">
        <option value="3600">1 hour</option>
        <option value="21600">6 hours</option>
        <option value="86400" selected>24 hours</option>
        <option value="259200">3 days</option>
        <option value="604800">7 days</option>
      </select>

      <button onclick="submitProposal()" class="btn-primary" style="width:100%; margin-top:28px;">
        Submit Proposal to DAO
      </button>
      <button onclick="hideCreateProposal()" style="width:100%; margin-top:12px; background:none; border:1px solid #555; color:#aaa; padding:14px;">
        Cancel
      </button>
    </div>
  </div>

  <script>
    let walletAddress = null;
    let proposals = [];

    async function connectPhantom() {
      if (!window.solana?.isPhantom) {
        alert("Phantom wallet not found. Please install it from phantom.app");
        return;
      }

      try {
        const resp = await window.solana.connect();
        walletAddress = resp.publicKey.toString();

        document.getElementById('walletAddress').textContent = 
          `${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
        
        document.getElementById('walletSection').style.display = 'inline-flex';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('voteBtn').style.display = 'inline-block';
        document.getElementById('proposalBtn').style.display = 'inline-block';

      } catch (err) {
        console.error(err);
        alert("Failed to connect wallet");
      }
    }

    async function castVote() {
      if (!walletAddress) return;

      const status = document.getElementById('status');
      status.innerHTML = '🔒 Preparing encrypted vote using Arcium MPC...';

      setTimeout(async () => {
        status.innerHTML = '📡 Requesting signature from Phantom...';

        try {
          const message = new TextEncoder().encode(
            "Cast private encrypted vote via Arcium MPC - Devnet"
          );
          
          await window.solana.signMessage(message, "utf8");

          status.innerHTML = `✅ Vote successfully cast and encrypted!<br><small>Signed by ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}</small>`;
          
          setTimeout(() => {
            status.innerHTML = '';
          }, 5000);

        } catch (err) {
          status.innerHTML = '❌ Signature rejected by user';
        }
      }, 1200);
    }

    function showCreateProposal() {
      document.getElementById('proposalModal').style.display = 'flex';
      // Optional: clear previous input
      // document.getElementById('propTitle').value = '';
      // document.getElementById('propDesc').value = '';
    }

    function hideCreateProposal() {
      document.getElementById('proposalModal').style.display = 'none';
    }

    function submitProposal() {
      const title = document.getElementById('propTitle').value.trim() || "Untitled Proposal";
      const desc = document.getElementById('propDesc').value.trim() || "No description provided";
      const duration = parseInt(document.getElementById('propDuration').value);

      proposals.unshift({
        id: Date.now(),
        title: title,
        desc: desc,
        endTime: Date.now() + duration * 1000,
        yes: Math.floor(Math.random() * 25) + 68,
        no: Math.floor(Math.random() * 18) + 12
      });

      hideCreateProposal();
      renderProposals();

      const status = document.getElementById('status');
      status.innerHTML = `✅ Proposal <strong>"${title}"</strong> published on-chain!`;
      
      setTimeout(() => status.innerHTML = '', 4500);
    }

    function renderProposals() {
      const container = document.getElementById('proposalList');

      if (proposals.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:#777; padding:40px;">No active proposals yet.</p>`;
        return;
      }

      container.innerHTML = proposals.map(p => {
        const timeLeft = Math.max(0, Math.floor((p.endTime - Date.now()) / 1000));
        let timerHTML = '';

        if (timeLeft > 0) {
          const hours = Math.floor(timeLeft / 3600);
          const minutes = Math.floor((timeLeft % 3600) / 60);
          timerHTML = `<div class="timer">${hours}h ${minutes}m remaining</div>`;
        } else {
          timerHTML = `<div class="ended">Voting ended • Results ready</div>`;
        }

        return `
          <div class="proposal-card">
            <strong style="font-size:1.25rem;">${p.title}</strong>
            <p style="margin:14px 0 16px; color:#ccc;">${p.desc}</p>
            ${timerHTML}
          </div>
        `;
      }).join('');
    }

    // Initial demo data
    proposals = [
      {
        id: 1,
        title: "Increase marketing budget by 20%",
        desc: "Allocate additional SOL to community growth, influencer partnerships, and content creation.",
        endTime: Date.now() + 86400000 * 1.5,
        yes: 78,
        no: 22
      }
    ];

    // Render on load
    renderProposals();
  </script>
</body>
</html>
